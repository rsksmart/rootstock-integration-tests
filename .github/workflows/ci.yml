name: RIT Action Continuous Integration Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rskj-branch:
        description: 'Branch for RSKj'
        required: false
        default: 'master'
      powpeg-branch:
        description: 'Branch for PowPeg Node'
        required: false
        default: 'master'
      test-suite:
        description: "Test suite to run: 'short' (fast PR subset) or 'full' (short + extra tests)"
        required: false
        default: 'full'
        type: choice
        options:
          - short
          - full

permissions:
  contents: read

# Cancel a still-running PR run when a new commit lands on the same PR, so a superseded commit
# doesn't keep occupying a runner. Push/workflow_dispatch runs are only serialized (queued), not
# cancelled, since those represent completed states worth validating to completion.
concurrency:
  group: rit-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TEST_TAG:  ${{ github.event.repository.name }}/rit:test
  LATEST_TAG: ghcr.io/rsksmart/${{ github.event.repository.name }}/rit
  # Every PR gets the short suite; pushes to main and manual runs default to the full (long) suite,
  # which can also be pointed at 'short' via workflow_dispatch.
  TEST_SUITE: ${{ github.event_name == 'pull_request' && 'short' || (github.event.inputs.test-suite || 'full') }}

jobs:
  build-push-rit-action-container-action:
    name: Test RIT Action docker container-action
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      packages: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.LATEST_TAG }}
            ${{ env.TEST_TAG }}

      - name: Setup Docker BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          install: true
          driver-opts: network=host
          platforms: linux/amd64

      - name: Build and export locally Docker
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: container-action/
          load: true
          tags: ${{ env.TEST_TAG }}

      # Call the composite action to set branch variables
      - name: Set Branch Variables
        uses: ./.github/actions/set-branch-variables
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Build URL
        id: set-build-url
        run: |
          BUILD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV

      - name: Set Notification Context
        id: set-notification-context
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
          GITHUB_EVENT_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title || '' }}
          GITHUB_EVENT_PULL_REQUEST_HTML_URL: ${{ github.event.pull_request.html_url || '' }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          GITHUB_EVENT_HEAD_COMMIT_URL: ${{ github.event.head_commit.url || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Replace (not delete) non-alphanumeric characters so stripped punctuation never welds
          # two words together (e.g. "rsksmart/rit-update" must not become "rsksmartrit-update"),
          # then squeeze runs of spaces and trim, and cap length to keep the Slack message concise.
          sanitize() {
            printf '%s' "$1" | tr -c '[:alnum:]_ -' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//' | cut -c1-75
          }

          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            NOTIFICATION_TITLE="PR #${GITHUB_EVENT_PULL_REQUEST_NUMBER}"
            NOTIFICATION_SUBTITLE=$(sanitize "$GITHUB_EVENT_PULL_REQUEST_TITLE")
            # A PR title made up entirely of characters sanitize() replaces with spaces (e.g. only emoji)
            # would otherwise produce an empty string, which Slack's Block Kit rejects (text
            # objects require a minimum length of 1), failing this step and misreporting a
            # successful run as failed.
            : "${NOTIFICATION_SUBTITLE:=PR #${GITHUB_EVENT_PULL_REQUEST_NUMBER}}"
            NOTIFICATION_URL="$GITHUB_EVENT_PULL_REQUEST_HTML_URL"
            NOTIFICATION_ACTION_LABEL="Open PR"
          else
            NOTIFICATION_TITLE="Push to ${GITHUB_REF_NAME}"
            NOTIFICATION_SUBTITLE=$(sanitize "$(printf '%s' "$GITHUB_EVENT_HEAD_COMMIT_MESSAGE" | head -n1)")
            # Same empty-string risk as above, for commit messages.
            : "${NOTIFICATION_SUBTITLE:=Commit ${GITHUB_SHA:0:7}}"
            NOTIFICATION_URL="$GITHUB_EVENT_HEAD_COMMIT_URL"
            NOTIFICATION_ACTION_LABEL="View Commit"
          fi

          echo "NOTIFICATION_TITLE=$NOTIFICATION_TITLE" >> $GITHUB_ENV
          echo "NOTIFICATION_SUBTITLE=$NOTIFICATION_SUBTITLE" >> $GITHUB_ENV
          echo "NOTIFICATION_URL=$NOTIFICATION_URL" >> $GITHUB_ENV
          echo "NOTIFICATION_ACTION_LABEL=$NOTIFICATION_ACTION_LABEL" >> $GITHUB_ENV

      - name: Test the RIT Container Action
        id: test-container
        env:
          INPUT_RSKJ_BRANCH: ${{ env.RSKJ_BRANCH }}
          INPUT_POWPEG_NODE_BRANCH: ${{ env.POWPEG_BRANCH }}
          INPUT_RIT_BRANCH: ${{ env.RIT_BRANCH }}
          INPUT_RIT_LOG_LEVEL: info
        run: |
          docker run \
            --env GITHUB_OUTPUT="/github-output"  \
            --env INPUT_RSKJ_BRANCH="${{ env.RSKJ_BRANCH }}"  \
            --env INPUT_POWPEG_NODE_BRANCH="${{ env.POWPEG_BRANCH }}"  \
            --env INPUT_RIT_BRANCH="${{ env.RIT_BRANCH }}"  \
            --env INPUT_RIT_LOG_LEVEL="${{ env.INPUT_RIT_LOG_LEVEL }}" \
            --env INPUT_TEST_SUITE="${{ env.TEST_SUITE }}" \
            -v "$GITHUB_OUTPUT:/github-output"  \
            --rm ${{ env.TEST_TAG }}

      - name: GitHub container registry login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the RIT Action Container Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: container-action/
          tags: ${{ env.LATEST_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          push: true

      - name: Check Slack Token
        id: check-slack-token
        # always() so this still runs (and the failure-notification step can gate on its output)
        # even if a step above failed.
        if: always()
        # Kept in its own step-scoped env (not job-level) so the token itself is never exposed
        # to other steps; only a boolean flag is exposed as an output.
        env:
          SLACK_NOTIFICATION_TOKEN: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
        run: |
          if [ -n "$SLACK_NOTIFICATION_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack Notification on Success
        if: success() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.owner.login == 'rsksmart')) && steps.check-slack-token.outputs.has_token == 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          token: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
          method: chat.postMessage
          payload: |
            channel: ${{ vars.GHA_SLACK_NOTIFICATION_CHANNEL }}
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "✅ PASSED — ${{ github.repository }} – ${{ env.NOTIFICATION_TITLE }}"
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: "*${{ env.NOTIFICATION_SUBTITLE }}*"
                fields:
                  - type: mrkdwn
                    text: "• rskj: `${{ env.RSKJ_BRANCH }}`\n• fed: `${{ env.POWPEG_BRANCH }}`\n• rit: `${{ env.RIT_BRANCH }}`"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "${{ env.NOTIFICATION_ACTION_LABEL }}"
                    url: "${{ env.NOTIFICATION_URL }}"
                  - type: button
                    text:
                      type: plain_text
                      text: View Actions Run
                    url: "${{ env.BUILD_URL }}"

      - name: Send Slack Notification on Failure
        if: failure() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.owner.login == 'rsksmart')) && steps.check-slack-token.outputs.has_token == 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          token: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
          method: chat.postMessage
          payload: |
            channel: ${{ vars.GHA_SLACK_NOTIFICATION_CHANNEL }}
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "❌ FAILED — ${{ github.repository }} – ${{ env.NOTIFICATION_TITLE }}"
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: "*${{ env.NOTIFICATION_SUBTITLE }}*"
                fields:
                  - type: mrkdwn
                    text: "• rskj: `${{ env.RSKJ_BRANCH }}`\n• fed: `${{ env.POWPEG_BRANCH }}`\n• rit: `${{ env.RIT_BRANCH }}`"
              - type: actions
                elements:
                  - type: button
                    style: danger
                    text:
                      type: plain_text
                      text: "${{ env.NOTIFICATION_ACTION_LABEL }}"
                    url: "${{ env.NOTIFICATION_URL }}"
                  - type: button
                    style: danger
                    text:
                      type: plain_text
                      text: View Actions Run
                    url: "${{ env.BUILD_URL }}"

  test-rit-action:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: build-push-rit-action-container-action
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Call the composite action here to set branch variables
      - name: Set Branch Variables
        uses: ./.github/actions/set-branch-variables
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Build URL
        id: set-build-url
        run: |
          BUILD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "BUILD_URL=$BUILD_URL" >> $GITHUB_ENV

      - name: Set Notification Context
        id: set-notification-context
        env:
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          GITHUB_EVENT_HEAD_COMMIT_URL: ${{ github.event.head_commit.url || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Replace (not delete) non-alphanumeric characters so stripped punctuation never welds
          # two words together (e.g. "rsksmart/rit-update" must not become "rsksmartrit-update"),
          # then squeeze runs of spaces and trim, and cap length to keep the Slack message concise.
          sanitize() {
            printf '%s' "$1" | tr -c '[:alnum:]_ -' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//' | cut -c1-75
          }

          # This job only runs on main (push/workflow_dispatch), never on pull_request.
          NOTIFICATION_TITLE="Push to ${GITHUB_REF_NAME}"
          NOTIFICATION_SUBTITLE=$(sanitize "$(printf '%s' "$GITHUB_EVENT_HEAD_COMMIT_MESSAGE" | head -n1)")
          # A commit message made up entirely of characters sanitize() replaces with spaces
          # would otherwise produce an empty string, which Slack's Block Kit rejects.
          : "${NOTIFICATION_SUBTITLE:=Commit ${GITHUB_SHA:0:7}}"
          NOTIFICATION_URL="$GITHUB_EVENT_HEAD_COMMIT_URL"
          NOTIFICATION_ACTION_LABEL="View Commit"

          echo "NOTIFICATION_TITLE=$NOTIFICATION_TITLE" >> $GITHUB_ENV
          echo "NOTIFICATION_SUBTITLE=$NOTIFICATION_SUBTITLE" >> $GITHUB_ENV
          echo "NOTIFICATION_URL=$NOTIFICATION_URL" >> $GITHUB_ENV
          echo "NOTIFICATION_ACTION_LABEL=$NOTIFICATION_ACTION_LABEL" >> $GITHUB_ENV

      - name: Test RIT Action
        id: test-rit-action
        uses: ./
        with:
          rskj-branch: ${{ env.RSKJ_BRANCH }}
          powpeg-node-branch: ${{ env.POWPEG_BRANCH }}
          rit-branch: ${{ env.RIT_BRANCH }}
          test-suite: ${{ env.TEST_SUITE }}

      - name: Print RIT Status and Message
        id: output
        run: |
          echo "RIT Status = ${{ steps.test-rit-action.outputs.status }}"
          echo "RIT Message = ${{ steps.test-rit-action.outputs.message }}"

      - name: Check Slack Token
        id: check-slack-token
        # always() so this still runs (and the failure-notification step can gate on its output)
        # even if a step above failed.
        if: always()
        # Kept in its own step-scoped env (not job-level) so the token itself is never exposed
        # to other steps (e.g. the RIT action above); only a boolean flag is exposed as an output.
        env:
          SLACK_NOTIFICATION_TOKEN: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
        run: |
          if [ -n "$SLACK_NOTIFICATION_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack Notification on Success
        # Gated to push events, like the rskj/powpeg-node workflows: a workflow_dispatch run has no
        # head_commit, so the commit-URL button would be empty and rejected by Slack's Block Kit.
        if: success() && github.event_name == 'push' && steps.check-slack-token.outputs.has_token == 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          token: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
          method: chat.postMessage
          payload: |
            channel: ${{ vars.GHA_SLACK_NOTIFICATION_CHANNEL }}
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "✅ PASSED — ${{ github.repository }} – ${{ env.NOTIFICATION_TITLE }}"
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: "*${{ env.NOTIFICATION_SUBTITLE }}*"
                fields:
                  - type: mrkdwn
                    text: "• rskj: `${{ env.RSKJ_BRANCH }}`\n• fed: `${{ env.POWPEG_BRANCH }}`\n• rit: `${{ env.RIT_BRANCH }}`"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "${{ env.NOTIFICATION_ACTION_LABEL }}"
                    url: "${{ env.NOTIFICATION_URL }}"
                  - type: button
                    text:
                      type: plain_text
                      text: View Actions Run
                    url: "${{ env.BUILD_URL }}"

      - name: Send Slack Notification on Failure
        # Gated to push events, like the rskj/powpeg-node workflows: a workflow_dispatch run has no
        # head_commit, so the commit-URL button would be empty and rejected by Slack's Block Kit.
        if: failure() && github.event_name == 'push' && steps.check-slack-token.outputs.has_token == 'true'
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          token: ${{ secrets.GHA_SLACK_NOTIFICATION_TOKEN }}
          method: chat.postMessage
          payload: |
            channel: ${{ vars.GHA_SLACK_NOTIFICATION_CHANNEL }}
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "❌ FAILED — ${{ github.repository }} – ${{ env.NOTIFICATION_TITLE }}"
                  emoji: true
              - type: section
                text:
                  type: mrkdwn
                  text: "*${{ env.NOTIFICATION_SUBTITLE }}*"
                fields:
                  - type: mrkdwn
                    text: "• rskj: `${{ env.RSKJ_BRANCH }}`\n• fed: `${{ env.POWPEG_BRANCH }}`\n• rit: `${{ env.RIT_BRANCH }}`"
              - type: actions
                elements:
                  - type: button
                    style: danger
                    text:
                      type: plain_text
                      text: "${{ env.NOTIFICATION_ACTION_LABEL }}"
                    url: "${{ env.NOTIFICATION_URL }}"
                  - type: button
                    style: danger
                    text:
                      type: plain_text
                      text: View Actions Run
                    url: "${{ env.BUILD_URL }}"
