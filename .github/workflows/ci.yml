name: RIT Action Continuous Integration Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-rit-docker:
    name: Test  RIT Action docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000

    env:
      TEST_TAG: localhost:5001/actions/container-action:latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}

      - name: Setup Docker BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: network=host
          platforms: linux/amd64

      - name: GitHub container registry login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the RIT Action Container Image
        uses: docker/build-push-action@v6
        with:
          context: .github/images
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run the RIT Container Action
        id: run
        env:
          RSKJ_BRANCH: 'master'
          FEDERATOR_BRANCH:  'master'
        run: |
          docker run \
            --env RSKJ_BRANCH="${{ env.RSKJ_BRANCH }}" \
            --env FEDERATOR_BRANCH="${{ env.FEDERATOR_BRANCH }}" \
            --rm ${{ env.TEST_TAG }}

  test-rit-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: GitHub container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test  RIT Action
        id: test-rit-action
        uses: docker://ghcr.io/rsksmart/rootstock-integration-tests/rit-action:latest
        with:
          rskj-branch: master
          federator-branch: master

      - name: Print RIT Status and Message
        id: output
        run: |
          echo "RIT Status = ${{ steps.test-action.outputs.status }}"
          echo "RIT Message = ${{ steps.test-action.outputs.message }}"