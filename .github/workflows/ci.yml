name: RIT Action Continuous Integration Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
env:
  TEST_TAG:  ${{ github.event.repository.name }}/rit-action:test
  LATEST_TAG: ghcr.io/rsksmart/${{ github.event.repository.name }}/rit-action:latest

jobs:
  build-push-rit-action-image:
    name: Test  RIT Action docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.event.repository.name }}/rit-action

      - name: Setup Docker BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: network=host
          platforms: linux/amd64

      - name: Build and export locally Docker
        uses: docker/build-push-action@v6
        with:
          context: .github/images
          load: true
          tags: ${{ env.TEST_TAG }}

      - name: Test the RIT Container Action
        id: test-container
        env:
          RSKJ_BRANCH: 'master'
          FEDERATOR_BRANCH: 'master'
        run: |
          docker run \
            --env RSKJ_BRANCH="${{ env.RSKJ_BRANCH }}" \
            --env FEDERATOR_BRANCH="${{ env.FEDERATOR_BRANCH }}" \
            --rm ${{ env.TEST_TAG }}

      - name: Build  the RIT Action Container Image
        uses: docker/build-push-action@v6
        with:
          context: .github/images
          tags:  ${{ env.LATEST_TAG }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: GitHub container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push RIT Action Container Image
        run: |
          docker push  ${{ env.LATEST_TAG }}

  test-rit-action:
    needs:  build-push-rit-action-image
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: GitHub container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test  RIT Action
        id: test-rit-action
        uses: docker://${{ env.LATEST_TAG }}
        with:
          rskj-branch: master
          federator-branch: master

      - name: Print RIT Status and Message
        id: output
        run: |
          echo "RIT Status = ${{ steps.test-action.outputs.status }}"
          echo "RIT Message = ${{ steps.test-action.outputs.message }}"